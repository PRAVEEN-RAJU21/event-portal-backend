spring.application.name=backend

# --- 1. DATABASE CONFIGURATION ---
# Using environment variables for security on Render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- 2. HIBERNATE & JPA SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Hibernate 6+ handles the dialect automatically, so we've removed the manual setting to avoid warnings

# --- 3. EMAIL CONFIGURATION (Port 465 SSL Fix) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=rajupraveenkumarrr@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}

# Security protocol adjustments for restricted cloud environments
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000

# --- 4. RENDER DEPLOYMENT SETTINGS ---
# Ensures the app binds to the port Render provides
server.port=${PORT:8080}